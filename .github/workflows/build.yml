name: Build geoip2 module packages

on:
  workflow_dispatch:
    inputs:
      nginx_version:
        description: 'NGINX version (e.g. 1.28.3). Leave blank to build all available stable versions.'
        required: false
      geoip2_version:
        description: 'geoip2 module tag (e.g. 3.4)'
        required: true
        default: '3.4'
      release:
        description: 'Create a GitHub release with the artifacts?'
        required: false
        type: boolean
        default: true
  schedule:
    # Weekly check for new nginx stable releases
    - cron: '0 6 * * 1'

jobs:
  generate-matrix:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      geoip2_version: ${{ steps.gen.outputs.geoip2_version }}
    steps:
      - id: gen
        env:
          NGINX_INPUT: ${{ inputs.nginx_version }}
          GEOIP2_VERSION: ${{ inputs.geoip2_version || '3.4' }}
        run: |
          MATRIX=$(python3 - <<'PYEOF'
          import os, re, json, urllib.request

          CODENAMES = [
              ('jammy', 'ubuntu:22.04'),
              ('noble', 'ubuntu:24.04'),
              # Ubuntu 26.04 — add once nginx.org publishes packages for it:
              # ('plucky', 'ubuntu:26.04'),
          ]
          ARCHES = ['amd64', 'arm64']
          nginx_input = os.environ.get('NGINX_INPUT', '').strip()

          includes = []
          for codename, image in CODENAMES:
              if nginx_input:
                  versions = [nginx_input]
              else:
                  url = (
                      'https://nginx.org/packages/ubuntu/dists/'
                      f'{codename}/nginx/binary-amd64/Packages'
                  )
                  with urllib.request.urlopen(url) as r:
                      content = r.read().decode()
                  # Parse the Packages file as RFC 2822-style stanzas so we
                  # only collect versions from the 'nginx' package itself
                  # (other entries like nginx-module-njs have different schemes).
                  seen = set()
                  stanza: dict = {}
                  for line in content.splitlines():
                      if line == '':
                          if stanza.get('Package') == 'nginx' and 'Version' in stanza:
                              raw = stanza['Version'].split(':')[-1]
                              v = re.split(r'[-+]', raw)[0]
                              parts = v.split('.')
                              if len(parts) >= 2 and int(parts[1]) % 2 == 0:
                                  seen.add(v)
                          stanza = {}
                      elif ': ' in line:
                          key, _, val = line.partition(': ')
                          stanza[key] = val
                  # Handle file that doesn't end with a blank line
                  if stanza.get('Package') == 'nginx' and 'Version' in stanza:
                      raw = stanza['Version'].split(':')[-1]
                      v = re.split(r'[-+]', raw)[0]
                      parts = v.split('.')
                      if len(parts) >= 2 and int(parts[1]) % 2 == 0:
                          seen.add(v)
                  versions = sorted(seen, key=lambda v: [int(x) for x in v.split('.')])

              for version in versions:
                  for arch in ARCHES:
                      includes.append({
                          'ubuntu': {'codename': codename, 'image': image},
                          'nginx_version': version,
                          'arch': arch,
                      })

          print(json.dumps({'include': includes}))
          PYEOF
          )
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
          echo "geoip2_version=${GEOIP2_VERSION}" >> "$GITHUB_OUTPUT"

  build:
    needs: generate-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}

    container:
      image: ${{ matrix.ubuntu.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build .deb
        env:
          NGINX_VERSION: ${{ matrix.nginx_version }}
          GEOIP2_VERSION: ${{ needs.generate-matrix.outputs.geoip2_version }}
          UBUNTU_CODENAME: ${{ matrix.ubuntu.codename }}
          ARCH: ${{ matrix.arch }}
          OUTPUT_DIR: ${{ github.workspace }}/output
        run: |
          mkdir -p "${OUTPUT_DIR}"
          chmod +x scripts/build.sh
          scripts/build.sh

      - name: Smoke test (install & nginx -t)
        env:
          NGINX_VERSION: ${{ matrix.nginx_version }}
          UBUNTU_CODENAME: ${{ matrix.ubuntu.codename }}
        run: |
          chmod +x scripts/smoke-test.sh
          DEB=$(find "$GITHUB_WORKSPACE/output" -name "*.deb" | head -1)
          if [ -z "$DEB" ]; then
            echo "No .deb found in $GITHUB_WORKSPACE/output/" >&2
            exit 1
          fi
          scripts/smoke-test.sh "$DEB"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.ubuntu.codename }}-nginx${{ matrix.nginx_version }}-${{ matrix.arch }}
          path: ${{ github.workspace }}/output/*.deb
          if-no-files-found: error

  release:
    needs: [generate-matrix, build]
    if: ${{ inputs.release != false }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: geoip2-${{ needs.generate-matrix.outputs.geoip2_version }}
          name: GeoIP2 module ${{ needs.generate-matrix.outputs.geoip2_version }}
          files: artifacts/*.deb
          generate_release_notes: false
          body: |
            Prebuilt `libnginx-mod-http-geoip2` (${{ needs.generate-matrix.outputs.geoip2_version }}) for all stable nginx releases from nginx.org.

            Each `.deb` filename encodes the nginx version and Ubuntu codename — install the one that matches your nginx:

            ```sh
            # Check your nginx version
            nginx -v

            # Install the matching package, e.g. nginx 1.28.3 on Ubuntu 24.04 (noble) amd64:
            apt install ./libnginx-mod-http-geoip2_1.28.3+${{ needs.generate-matrix.outputs.geoip2_version }}-1~noble_amd64.deb
            ```

            **Supported:** Ubuntu 22.04 (jammy), 24.04 (noble) · amd64, arm64

            See the README for full installation instructions.

  publish-apt-repo:
    needs: [generate-matrix, build]
    if: ${{ inputs.release != false }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout main (for scripts)
        uses: actions/checkout@v4

      - name: Download all .deb artifacts
        uses: actions/download-artifact@v4
        with:
          path: debs
          merge-multiple: true

      - name: List downloaded debs
        run: ls -lh debs/

      - name: Install apt repo tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            dpkg-dev apt-utils gnupg

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "${GPG_PRIVATE_KEY}" | gpg --batch --import
          # Trust the key fully so gpg doesn't prompt
          GPG_FP=$(gpg --list-secret-keys --with-colons \
              | awk -F: '/^fpr/{print $10; exit}')
          echo "${GPG_FP}:6:" | gpg --import-ownertrust

      - name: Checkout (or create) gh-pages branch
        run: |
          git fetch origin gh-pages 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add gh-pages origin/gh-pages
          else
            # First time: create an empty orphan branch
            git worktree add --orphan gh-pages gh-pages
            cd gh-pages && git commit --allow-empty -m "chore: init gh-pages"
          fi

      - name: Build / update apt repository
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          chmod +x scripts/build-apt-repo.sh
          scripts/build-apt-repo.sh debs gh-pages

      - name: Add index page if missing
        run: |
          if [ ! -f gh-pages/index.html ]; then
            cat > gh-pages/index.html <<'HTML'
          <!doctype html>
          <html>
          <head><meta charset="utf-8"><title>Epartment nginx apt repository</title></head>
          <body>
          <h1>Epartment nginx apt repository</h1>
          <p>See the <a href="https://github.com/${{ github.repository }}">README</a>
          for installation instructions.</p>
          </body>
          </html>
          HTML
          fi

      - name: Commit and push gh-pages
        run: |
          cd gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing changed in the apt repo, skipping commit."
          else
            git commit -m "apt-repo: update packages (geoip2 ${{ needs.generate-matrix.outputs.geoip2_version }})"
            git push origin HEAD:gh-pages
          fi
