name: Build geoip2 module packages

on:
  workflow_dispatch:
    inputs:
      nginx_version:
        description: 'NGINX version (e.g. 1.27.3). Leave blank to auto-detect latest mainline.'
        required: false
      geoip2_version:
        description: 'geoip2 module tag (e.g. 3.4)'
        required: true
        default: '3.4'
      release:
        description: 'Create a GitHub release with the artifacts?'
        required: false
        type: boolean
        default: true
  schedule:
    # Weekly check for new nginx mainline releases
    - cron: '0 6 * * 1'

jobs:
  detect-version:
    runs-on: ubuntu-24.04
    outputs:
      nginx_version: ${{ steps.detect.outputs.version }}
      geoip2_version: ${{ steps.detect.outputs.geoip2 }}
    steps:
      - id: detect
        run: |
          if [ -n "${{ inputs.nginx_version }}" ]; then
            VERSION="${{ inputs.nginx_version }}"
          else
            VERSION=$(curl -fsSL https://nginx.org/en/download.html \
              | grep -oP 'nginx-\K[0-9]+\.[0-9]+\.[0-9]+(?=\.tar\.gz)' \
              | head -1)
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "geoip2=${{ inputs.geoip2_version || '3.4' }}" >> "$GITHUB_OUTPUT"
          echo "Building nginx ${VERSION} with geoip2 ${{ inputs.geoip2_version || '3.4' }}"

  build:
    needs: detect-version
    strategy:
      fail-fast: false
      matrix:
        ubuntu:
          - { codename: jammy,  image: 'ubuntu:22.04' }
          - { codename: noble,  image: 'ubuntu:24.04' }
          # Ubuntu 26.04 LTS — uncomment and set correct codename/tag once released.
          # - { codename: TBD,    image: 'ubuntu:26.04' }
        arch:
          - amd64
          - arm64

    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}

    container:
      image: ${{ matrix.ubuntu.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build .deb
        env:
          NGINX_VERSION: ${{ needs.detect-version.outputs.nginx_version }}
          GEOIP2_VERSION: ${{ needs.detect-version.outputs.geoip2_version }}
          UBUNTU_CODENAME: ${{ matrix.ubuntu.codename }}
          ARCH: ${{ matrix.arch }}
          OUTPUT_DIR: ${{ github.workspace }}/output
        run: |
          mkdir -p "${OUTPUT_DIR}"
          chmod +x scripts/build.sh
          scripts/build.sh

      - name: Smoke test (install & nginx -t)
        env:
          NGINX_VERSION: ${{ needs.detect-version.outputs.nginx_version }}
          UBUNTU_CODENAME: ${{ matrix.ubuntu.codename }}
        run: |
          chmod +x scripts/smoke-test.sh
          DEB=$(find "$GITHUB_WORKSPACE/output" -name "*.deb" | head -1)
          if [ -z "$DEB" ]; then
            echo "No .deb found in $GITHUB_WORKSPACE/output/" >&2
            exit 1
          fi
          scripts/smoke-test.sh "$DEB"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.ubuntu.codename }}-${{ matrix.arch }}
          path: ${{ github.workspace }}/output/*.deb
          if-no-files-found: error

  release:
    needs: [detect-version, build]
    if: ${{ inputs.release != false }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nginx-${{ needs.detect-version.outputs.nginx_version }}-geoip2-${{ needs.detect-version.outputs.geoip2_version }}
          name: nginx ${{ needs.detect-version.outputs.nginx_version }} + geoip2 ${{ needs.detect-version.outputs.geoip2_version }}
          files: artifacts/*.deb
          generate_release_notes: true
          body: |
            Prebuilt `libnginx-mod-http-geoip2` for nginx.org's nginx ${{ needs.detect-version.outputs.nginx_version }}.

            **Compatible with:** `nginx=${{ needs.detect-version.outputs.nginx_version }}-1~<codename>` from nginx.org's apt repo.

            See the README for installation instructions.
